<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="lyallpur_telecom_broadband">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Lyallpur Telecom Broadband</title>
  <link rel="manifest" href="manifest.json">
  <style>
    body {
      background-color: #0D1117;
      margin: 0;
      padding: 0;
    }
    #loading-indicator {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background-color: #0D1117;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 99999;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      transition: opacity 0.4s ease-out;
    }
    .signal-pulse {
      position: relative;
      width: 120px;
      height: 120px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
    }
    .signal-pulse .ring {
      position: absolute;
      border: 2.5px solid #58a6ff;
      border-radius: 50%;
      opacity: 0;
      animation: pulsate 2.5s infinite ease-out;
    }
    .signal-pulse .ring:nth-child(1) {
      animation-delay: 0s;
    }
    .signal-pulse .ring:nth-child(2) {
      animation-delay: 0.83s;
    }
    .signal-pulse .ring:nth-child(3) {
      animation-delay: 1.66s;
    }
    .signal-pulse .core {
      position: absolute;
      width: 40px;
      height: 40px;
      background-color: #1f6feb;
      border: 3.5px solid #58a6ff;
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      box-shadow: 0 0 20px rgba(31, 111, 235, 0.6);
    }
    @keyframes pulsate {
      0% {
        width: 40px;
        height: 40px;
        opacity: 0.8;
      }
      100% {
        width: 120px;
        height: 120px;
        opacity: 0;
      }
    }
    #loading-indicator .title {
      font-size: 24px;
      font-weight: bold;
      color: #ffffff;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    #loading-indicator .subtitle {
      font-size: 14px;
      color: #8b949e;
      letter-spacing: 0.5px;
    }
  </style>
</head>
<body>
  <div id="loading-indicator">
    <div class="signal-pulse">
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="ring"></div>
      <div class="core">
        <svg viewBox="0 0 24 24" width="22" height="22">
          <path fill="currentColor" d="M12,3c-4.97,0-9,4.03-9,9c0,2.12,0.74,4.07,1.97,5.61L4.35,19.4c-1.47-1.95-2.35-4.38-2.35-7c0-6.08,4.92-11,11-11s11,4.92,11,11c0,2.62-0.88,5.05-2.35,7l-1.62-1.79C21.26,16.07,22,14.12,22,12C22,7.03,17.97,3,12,3z M12,7c-2.76,0-5,2.24-5,5c0,1.35,0.53,2.58,1.4,3.49l1.42-1.57C9.31,13.43,9,12.75,9,12c0-1.66,1.34-3,3-3s3,1.66,3,3c0,0.75-0.31,1.43-0.82,1.92l1.42,1.57C16.47,14.58,17,13.35,17,12C17,9.24,14.76,7,12,7z M12,11c-0.55,0-1,0.45-1,1c0,0.55,0.45,1,1,1s1-0.45,1-1C13,11.45,12.55,11,12,11z"/>
        </svg>
      </div>
    </div>
    <div class="title">Lyallpur Telecom</div>
    <div class="subtitle">Loading Console...</div>
  </div>

  <script>
    (function() {
      const observer = new MutationObserver((mutations) => {
        if (document.querySelector('flutter-view')) {
          const loader = document.getElementById('loading-indicator');
          if (loader) {
            loader.style.opacity = '0';
            setTimeout(() => loader.remove(), 400);
          }
          observer.disconnect();
        }
      });
      observer.observe(document.body, { childList: true, subtree: true });
    })();
  </script>
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
